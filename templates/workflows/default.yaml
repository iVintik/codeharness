tasks:
  create-story:
    agent: story-creator
    session: fresh
    source_access: true
    driver: opencode
    model: kimi-for-coding/k2p5
    timeout_minutes: 15
  implement:
    agent: dev
    session: fresh
    source_access: true
    driver: opencode
    model: gpt-5.4
    timeout_minutes: 30
  check:
    agent: checker
    session: fresh
    source_access: true
    driver: opencode
    model: gpt-5.4
    timeout_minutes: 10
  review:
    agent: reviewer
    session: fresh
    source_access: true
    driver: opencode
    model: kimi-for-coding/k2p5
    timeout_minutes: 10
  document:
    agent: documenter
    session: fresh
    source_access: true
    driver: opencode
    model: gpt-5.4
    timeout_minutes: 15
  deploy:
    agent: deployer
    session: fresh
    source_access: true
    driver: opencode
    model: gpt-5.4
    timeout_minutes: 30
  verify:
    agent: evaluator
    session: fresh
    source_access: false
    driver: opencode
    model: kimi-for-coding/k2p5
    timeout_minutes: 30
  retry:
    agent: dev
    session: fresh
    source_access: true
    driver: opencode
    model: gpt-5.4
    timeout_minutes: 15
  retro:
    agent: retro
    session: fresh
    source_access: true
    driver: opencode
    model: kimi-for-coding/k2p5
    timeout_minutes: 15

# Default driver and model for any task without explicit configuration
defaults:
  driver: opencode
  model: gpt-5.4

workflow:
  steps:
    - for_each: epic
      steps:
        - for_each: story
          steps:
            - create-story
            - implement
            - gate: quality
              check: [check, review]
              fix: [retry]
              pass_when: consensus
              max_retries: 5
              circuit_breaker: stagnation
            - document
        - retro
    - deploy
    - gate: verification
      check: [verify]
      fix: [retry, document, deploy]
      pass_when: consensus
      max_retries: 3
      circuit_breaker: stagnation
