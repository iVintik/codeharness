name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.1)'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify version sync
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION plugin.json=$PLUGIN_VERSION"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run integration tests
        run: bats tests/*.bats

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish with OIDC
        run: npm publish --access public --provenance

  marketplace:
    name: Update Claude marketplace
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Read plugin metadata
        id: meta
        run: |
          echo "name=$(jq -r .name .claude-plugin/plugin.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version .claude-plugin/plugin.json)" >> "$GITHUB_OUTPUT"

      - name: Dispatch marketplace update
        run: |
          gh api repos/iVintik/private-claude-marketplace/dispatches \
            -f event_type=plugin-release \
            -f 'client_payload[plugin]=${{ steps.meta.outputs.name }}' \
            -f 'client_payload[version]=${{ steps.meta.outputs.version }}'
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
