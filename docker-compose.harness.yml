# codeharness observability stack
# Generated by /harness-init based on enforcement config.
# All images use pinned versions (NFR8).

services:
  victoria-logs:
    image: victoriametrics/victoria-logs:v1.15.0-victorialogs
    container_name: codeharness-logs
    ports:
      - "9428:9428"
    volumes:
      - vlogs-data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=7d"
    networks:
      - codeharness-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    container_name: codeharness-metrics
    ports:
      - "8428:8428"
    volumes:
      - vmetrics-data:/storage
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=30d"
    networks:
      - codeharness-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: codeharness-otel
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      victoria-logs:
        condition: service_healthy
      victoria-metrics:
        condition: service_healthy
    networks:
      - codeharness-net

volumes:
  vlogs-data:
  vmetrics-data:

networks:
  codeharness-net:
    name: codeharness-net
