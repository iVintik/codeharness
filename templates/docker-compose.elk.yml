# codeharness observability stack — OpenSearch/ELK backend
# Generated by /harness-init with --observability-backend elk.
# All images use pinned versions (NFR8).

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: codeharness-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - codeharness-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: codeharness-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - codeharness-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: codeharness-otel
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - codeharness-net

volumes:
  opensearch-data:

networks:
  codeharness-net:
    name: codeharness-net
