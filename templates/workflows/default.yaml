tasks:
  create-story:
    agent: story-creator
    session: fresh
    source_access: true
    model: claude-opus-4-6
  implement:
    agent: dev
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  check:
    agent: checker
    session: fresh
    source_access: true
    driver: codex
  review:
    agent: reviewer
    session: fresh
    source_access: true
    driver: codex
  document:
    agent: documenter
    session: fresh
    source_access: true
    model: claude-opus-4-6
  deploy:
    agent: deployer
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  verify:
    agent: evaluator
    session: fresh
    source_access: false
    driver: codex
  retry:
    agent: dev
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  retro:
    agent: retro
    session: fresh
    source_access: true
    model: claude-opus-4-6

story_flow:
  - create-story
  - implement
  - check
  - review
  - loop:
      - retry
      - check
      - review
  - document

epic_flow:
  - story_flow
  - deploy
  - verify
  - loop:
      - retry
      - document
      - deploy
      - verify
  - retro
