rules:
  - id: rust-function-no-tracing
    patterns:
      - pattern-either:
          - pattern: |
              fn $FUNC(...) { ... }
          - pattern: |
              pub fn $FUNC(...) { ... }
          - pattern: |
              async fn $FUNC(...) { ... }
          - pattern: |
              pub async fn $FUNC(...) { ... }
      - pattern-not: |
          #[tracing::instrument]
          fn $FUNC(...) { ... }
      - pattern-not: |
          #[tracing::instrument]
          pub fn $FUNC(...) { ... }
      - pattern-not: |
          #[tracing::instrument]
          async fn $FUNC(...) { ... }
      - pattern-not: |
          #[tracing::instrument]
          pub async fn $FUNC(...) { ... }
      - pattern-not: |
          #[instrument]
          fn $FUNC(...) { ... }
      - pattern-not: |
          #[instrument]
          pub fn $FUNC(...) { ... }
      - pattern-not: |
          #[instrument]
          async fn $FUNC(...) { ... }
      - pattern-not: |
          #[instrument]
          pub async fn $FUNC(...) { ... }
      - pattern-not: |
          fn $FUNC(...) {
            ...
            tracing::debug!(...);
            ...
          }
