tasks:
  create-story:
    agent: story-creator
    session: fresh
    source_access: true
    model: claude-opus-4-6
  implement:
    agent: dev
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  check:
    agent: checker
    session: fresh
    source_access: true
    driver: codex
  review:
    agent: reviewer
    session: fresh
    source_access: true
    driver: codex
  document:
    agent: documenter
    session: fresh
    source_access: true
    model: claude-opus-4-6
  deploy:
    agent: deployer
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  verify:
    agent: evaluator
    session: fresh
    source_access: false
    driver: codex
  retry:
    agent: dev
    session: fresh
    source_access: true
    model: claude-sonnet-4-6
  retro:
    agent: retro
    session: fresh
    source_access: true
    model: claude-opus-4-6

workflow:
  for_each: epic
  steps:
    - for_each: story
      steps:
        - create-story
        - implement
        - gate: quality
          check: [check, review]
          fix: [retry]
          pass_when: consensus
          max_retries: 5
          circuit_breaker: stagnation
        - document
    - deploy
    - gate: verification
      check: [verify]
      fix: [retry, document, deploy]
      pass_when: consensus
      max_retries: 3
      circuit_breaker: stagnation
    - retro
