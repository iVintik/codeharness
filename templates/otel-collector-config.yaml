# codeharness OpenTelemetry Collector configuration
# Routes OTLP data to VictoriaMetrics stack.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Logs → VictoriaLogs
  otlphttp/logs:
    endpoint: http://victoria-logs:9428/insert/opentelemetry
    tls:
      insecure: true

  # Metrics → VictoriaMetrics
  prometheusremotewrite:
    endpoint: http://victoria-metrics:8428/api/v1/write
    tls:
      insecure: true

  # Traces → VictoriaTraces (if enabled)
  otlphttp/traces:
    endpoint: http://victoria-traces:14268
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces]
